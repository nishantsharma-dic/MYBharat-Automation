# ============================================================
# BETA Environment Configuration
# ============================================================
# File: config-beta.properties
# Purpose: Stores environment-specific settings for the BETA test environment.
# Loaded by: ConfigReader.java (based on -Denv=beta system property)
#
# Beta Environment:
#   - URL: https://yuva-beta.mybharats.in (internal staging server)
#   - Used for: Development testing, pre-release validation, CI pipeline runs
#   - Data: Test data only — can be reset periodically
#
# Usage:
#   mvn test -Denv=beta -Dbrowser=chrome
#   mvn test -Denv=beta -Dbrowser=headless -DciMode=true
# ============================================================

# Base application URL for the beta environment
url=https://yuva-beta.mybharats.in

# Youth profile page URL (React app)
profileUrl=https://yuva-beta.mybharats.in/youth-profile

# Yopmail URL for OTP retrieval (disposable email inbox)
dummyEmail=https://yopmail.com/en/

# Default password for test accounts
password=25@March

# Default browser (overridable via -Dbrowser system property)
browser=firefox

# Implicit wait timeout in seconds
timeout=30
