# ============================================================
# PROD Environment Configuration
# ============================================================
# File: config-prod.properties
# Purpose: Stores environment-specific settings for the PRODUCTION environment.
# Loaded by: ConfigReader.java (based on -Denv=prod system property)
#
# Production Environment:
#   - URL: https://mybharat.gov.in (live public-facing site)
#   - Used for: Smoke tests, regression validation, release verification
#   - Data: Real production data — tests should be non-destructive
#
# Usage:
#   mvn test -Denv=prod -Dbrowser=chrome
#   mvn test -Denv=prod -Dbrowser=firefox -Dsurefire.suiteXmlFiles=testSuites/testng-youth.xml
# ============================================================

# Base application URL for the production environment
url=https://mybharat.gov.in

# Youth profile page URL (React app)
profileUrl=https://mybharat.gov.in/youth-profile

# Yopmail URL for OTP retrieval (disposable email inbox)
dummyEmail=https://yopmail.com/en/

# Default password for test accounts
password=25@March

# Default browser (overridable via -Dbrowser system property)
browser=firefox

# Implicit wait timeout in seconds
timeout=30
