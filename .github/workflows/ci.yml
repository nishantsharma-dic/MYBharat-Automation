name: CI - Build & Validate Framework

# When does this run?
on:
  pull_request:
    branches:
      - integration
      - main
  push:
    branches:
      - integration

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Java
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # Step 3: Compile the project (catches syntax errors, missing imports)
      - name: Build with Maven
        run: mvn compile -DskipTests

      # Step 4: Run a quick validation (compile tests too)
      - name: Compile Tests
        run: mvn test-compile
