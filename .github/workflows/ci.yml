name: CI - Build & Validate Framework

on:
  pull_request:
    branches:
      - integration
      - main
  push:
    branches:
      - integration

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile project
        run: mvn compile -DskipTests

      - name: Compile tests
        run: mvn test-compile
