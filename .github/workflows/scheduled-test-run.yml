name: Scheduled Test Execution � MY Bharat (Production)

on:
  workflow_dispatch:  # Manual trigger only from GitHub UI

jobs:
  run-tests:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Full Test Suite
        id: test_run
        continue-on-error: true
        run: |
          mvn test \
            -Denv=prod \
            -Dbrowser=chrome \
            -Dsurefire.suiteXmlFiles=testSuites/testng-all-modules.xml

      - name: Parse test results
        id: parse
        if: always()
        run: |
          REPORT_FILE="target/surefire-reports/testng-results.xml"
          if [ -f "$REPORT_FILE" ]; then
            # Count exactly the 13 test methods shown in the email table
            TRACKED_METHODS="publicPages registerIndianYouth verifyUserInDatabase logoutUser loginWithOTP completeYouthProfile verifyRegistrationCertificateDownload clickBasicInfoAndExtractEmail attemptCompetitiveQuiz verifyQuizCertificateDownload writeAndPublishBlog step15_submit step19_superAdminApprove createVOEvent"
            PASSED=0
            FAILED=0
            SKIPPED=0
            for method in $TRACKED_METHODS; do
              if grep -q "name=\"$method\"" "$REPORT_FILE" 2>/dev/null; then
                if grep -A2 "name=\"$method\"" "$REPORT_FILE" | grep -q 'status="FAIL"'; then
                  FAILED=$((FAILED + 1))
                else
                  PASSED=$((PASSED + 1))
                fi
              else
                SKIPPED=$((SKIPPED + 1))
              fi
            done
            TOTAL=$((PASSED + FAILED))
          else
            TOTAL="N/A"
            PASSED="N/A"
            FAILED="N/A"
            SKIPPED="N/A"
          fi
          echo "total=${TOTAL:-0}" >> $GITHUB_OUTPUT
          echo "passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT

      - name: Determine test result
        id: result
        if: always()
        run: |
          FAILED="${{ steps.parse.outputs.failed }}"
          if [ "$FAILED" == "0" ] || [ "$FAILED" == "N/A" ] && [ "${{ steps.test_run.outcome }}" == "success" ]; then
            echo "status=ALL TESTS PASSED" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "color=#28a745" >> $GITHUB_OUTPUT
          elif [ "$FAILED" == "0" ]; then
            echo "status=ALL TESTS PASSED" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "color=#28a745" >> $GITHUB_OUTPUT
          else
            echo "status=SOME TESTS FAILED" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "color=#dc3545" >> $GITHUB_OUTPUT
          fi
          echo "timestamp=$(TZ='Asia/Kolkata' date +'%d-%b-%Y %I:%M %p IST')" >> $GITHUB_OUTPUT

      - name: Extract test details
        id: details
        if: always()
        run: |
          # Extract registered email from logs
          REG_EMAIL=$(grep -r '@yopmail.com' target/surefire-reports/ 2>/dev/null | grep -o '[A-Za-z0-9]*@yopmail.com' | head -1 || echo "N/A")
          echo "reg_email=${REG_EMAIL:-N/A}" >> $GITHUB_OUTPUT

          # Extract quiz name
          if [ -f "reports/quiz_name.txt" ]; then
            QUIZ_NAME=$(cat reports/quiz_name.txt)
          else
            QUIZ_NAME="Competitive Quiz"
          fi
          echo "quiz_name=${QUIZ_NAME}" >> $GITHUB_OUTPUT

          # Check if quiz was available
          if [ "$QUIZ_NAME" = "No Quiz Available" ]; then
            QUIZ_AVAILABLE="false"
          else
            QUIZ_AVAILABLE="true"
          fi
          echo "quiz_available=${QUIZ_AVAILABLE}" >> $GITHUB_OUTPUT

          # Parse individual test results from TestNG XML
          REPORT_FILE="target/surefire-reports/testng-results.xml"
          get_status() {
            local method="$1"
            if grep -q "name=\"$method\"" "$REPORT_FILE" 2>/dev/null; then
              if grep -A2 "name=\"$method\"" "$REPORT_FILE" | grep -q 'status="FAIL"'; then
                echo "<span style=\"color:#dc3545;font-weight:bold\">&#10008; FAIL</span>"
              else
                echo "<span style=\"color:#28a745;font-weight:bold\">&#10004; PASS</span>"
              fi
            else
              echo "<span style=\"color:#ffc107;font-weight:bold\">&#9654; SKIP</span>"
            fi
          }

          # Public Pages � single test method "publicPages"
          echo "s0=$(get_status 'publicPages')" >> $GITHUB_OUTPUT

          echo "s1=$(get_status 'registerIndianYouth')" >> $GITHUB_OUTPUT
          echo "s2=$(get_status 'verifyUserInDatabase')" >> $GITHUB_OUTPUT
          echo "s3=$(get_status 'logoutUser')" >> $GITHUB_OUTPUT
          echo "s4=$(get_status 'loginWithOTP')" >> $GITHUB_OUTPUT
          echo "s5=$(get_status 'completeYouthProfile')" >> $GITHUB_OUTPUT
          echo "s6=$(get_status 'verifyRegistrationCertificateDownload')" >> $GITHUB_OUTPUT
          echo "s7=$(get_status 'clickBasicInfoAndExtractEmail')" >> $GITHUB_OUTPUT
          # Quiz: show special status if no quiz was available
          if [ "$QUIZ_AVAILABLE" = "false" ]; then
            echo "s8=?? No Quiz Available" >> $GITHUB_OUTPUT
            echo "s9=?? No Quiz Available" >> $GITHUB_OUTPUT
          else
            echo "s8=$(get_status 'attemptCompetitiveQuiz')" >> $GITHUB_OUTPUT
            echo "s9=$(get_status 'verifyQuizCertificateDownload')" >> $GITHUB_OUTPUT
          fi
          echo "s10=$(get_status 'writeAndPublishBlog')" >> $GITHUB_OUTPUT

          # Read Youth Club name from file (saved by test)
          if [ -f "reports/youth_club_name.txt" ]; then
            YC_NAME=$(cat reports/youth_club_name.txt)
          else
            YC_NAME="Youth Club"
          fi
          echo "yc_name=${YC_NAME}" >> $GITHUB_OUTPUT

          # Youth Club — use same get_status function as other rows
          echo "s11=$(get_status 'step15_submit')" >> $GITHUB_OUTPUT
          echo "s12=$(get_status 'step19_superAdminApprove')" >> $GITHUB_OUTPUT
