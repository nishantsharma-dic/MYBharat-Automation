name: Scheduled Test Execution — MY Bharat (Production)

on:
  schedule:
    # 9:40 AM IST = 4:10 AM UTC
    - cron: '10 4 * * *'
    # 6:00 PM IST = 12:30 PM UTC
    - cron: '30 12 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  run-tests:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Full Test Suite
        id: test_run
        continue-on-error: true
        run: |
          mvn test \
            -Denv=prod \
            -Dbrowser=headless \
            -Dsurefire.suiteXmlFiles=testSuites/testng-ci.xml

      - name: Determine test result
        id: result
        if: always()
        run: |
          if [ "${{ steps.test_run.outcome }}" == "success" ]; then
            echo "status=ALL TESTS PASSED" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "color=#28a745" >> $GITHUB_OUTPUT
          else
            echo "status=SOME TESTS FAILED" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "color=#dc3545" >> $GITHUB_OUTPUT
          fi
          echo "timestamp=$(TZ='Asia/Kolkata' date +'%d-%b-%Y %I:%M %p IST')" >> $GITHUB_OUTPUT

      - name: Parse test results
        id: parse
        if: always()
        run: |
          REPORT_FILE="target/surefire-reports/testng-results.xml"
          if [ -f "$REPORT_FILE" ]; then
            LINE=$(head -3 "$REPORT_FILE" | tr ' ' '\n')
            TOTAL=$(echo "$LINE" | sed -n 's/.*total="\([0-9]*\)".*/\1/p')
            PASSED=$(echo "$LINE" | sed -n 's/.*passed="\([0-9]*\)".*/\1/p')
            FAILED=$(echo "$LINE" | sed -n 's/.*failed="\([0-9]*\)".*/\1/p')
            SKIPPED=$(echo "$LINE" | sed -n 's/.*skipped="\([0-9]*\)".*/\1/p')
          else
            TOTAL="N/A"
            PASSED="N/A"
            FAILED="N/A"
            SKIPPED="N/A"
          fi
          echo "total=${TOTAL:-0}" >> $GITHUB_OUTPUT
          echo "passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT

      - name: Upload ExtentReport as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}
          path: reports/index.html
          retention-days: 30

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: reports/*.png
          retention-days: 30
          if-no-files-found: ignore

      - name: Send report email to seniors
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "${{ steps.result.outputs.emoji }} MY Bharat Daily Report | ${{ steps.result.outputs.status }} | ${{ steps.result.outputs.timestamp }}"
          to: ${{ secrets.SENIOR_EMAILS }}
          from: "MY Bharat QA <${{ secrets.SMTP_USERNAME }}>"
          html_body: |
            <div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 650px; margin: 0 auto;">
              <div style="background: #160363; padding: 25px; text-align: center; border-radius: 8px 8px 0 0;">
                <h1 style="color: #fff; margin: 0; font-size: 20px;">MY Bharat — QA Automation Report</h1>
                <p style="color: #c4b5fd; margin: 5px 0 0; font-size: 13px;">Production | Daily Scheduled Run</p>
              </div>
              <div style="background: ${{ steps.result.outputs.color }}; padding: 12px; text-align: center;">
                <h2 style="color: #fff; margin: 0;">${{ steps.result.outputs.emoji }} ${{ steps.result.outputs.status }}</h2>
              </div>
              <div style="padding: 20px; border: 1px solid #e0e0e0; border-top: none;">
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 15px;">
                  <tr><td style="padding: 8px; font-weight: bold;">Time:</td><td style="padding: 8px;">${{ steps.result.outputs.timestamp }}</td></tr>
                  <tr style="background:#f9f9f9;"><td style="padding: 8px; font-weight: bold;">Environment:</td><td style="padding: 8px;">Production (mybharat.gov.in)</td></tr>
                  <tr><td style="padding: 8px; font-weight: bold;">Browser:</td><td style="padding: 8px;">Chrome Headless</td></tr>
                  <tr style="background:#f9f9f9;"><td style="padding: 8px; font-weight: bold;">Suite:</td><td style="padding: 8px;">All Modules (Full E2E)</td></tr>
                </table>
                <h3 style="margin: 15px 0 10px;">Test Results</h3>
                <table style="width: 100%; border-collapse: collapse; text-align: center;">
                  <tr style="background: #160363; color: white;">
                    <th style="padding: 10px;">Total</th><th style="padding: 10px;">Passed</th><th style="padding: 10px;">Failed</th><th style="padding: 10px;">Skipped</th>
                  </tr>
                  <tr style="font-size: 18px; font-weight: bold;">
                    <td style="padding: 10px; border: 1px solid #ddd;">${{ steps.parse.outputs.total }}</td>
                    <td style="padding: 10px; border: 1px solid #ddd; color: #28a745;">${{ steps.parse.outputs.passed }}</td>
                    <td style="padding: 10px; border: 1px solid #ddd; color: #dc3545;">${{ steps.parse.outputs.failed }}</td>
                    <td style="padding: 10px; border: 1px solid #ddd; color: #ffc107;">${{ steps.parse.outputs.skipped }}</td>
                  </tr>
                </table>
                <div style="text-align: center; margin: 20px 0;">
                  <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="background: #160363; color: white; padding: 10px 25px; text-decoration: none; border-radius: 5px;">View Full Report</a>
                </div>
              </div>
              <div style="background: #f8f9fa; padding: 10px; text-align: center; border-radius: 0 0 8px 8px; border: 1px solid #e0e0e0; border-top: none;">
                <p style="color: #888; font-size: 11px; margin: 0;">MY Bharat | QA Team | Nishant Sharma | Daily 9:40 AM & 6:00 PM IST</p>
              </div>
            </div>
