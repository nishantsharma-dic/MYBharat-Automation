name: Scheduled Test Execution — MY Bharat (Production)

on:
  schedule:
    # 9:40 AM IST = 4:10 AM UTC
    - cron: '10 4 * * *'
    # 1:00 PM IST = 7:30 AM UTC
    - cron: '30 7 * * *'
    # 5:00 PM IST = 11:30 AM UTC
    - cron: '30 11 * * *'
    # 8:00 PM IST = 2:30 PM UTC
    - cron: '30 14 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  run-tests:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Full Test Suite
        id: test_run
        continue-on-error: true
        run: |
          mvn test \
            -Denv=prod \
            -Dbrowser=chrome \
            -Dsurefire.suiteXmlFiles=testSuites/testng-all-modules.xml

      - name: Determine test result
        id: result
        if: always()
        run: |
          if [ "${{ steps.test_run.outcome }}" == "success" ]; then
            echo "status=ALL TESTS PASSED" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "color=#28a745" >> $GITHUB_OUTPUT
          else
            echo "status=SOME TESTS FAILED" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "color=#dc3545" >> $GITHUB_OUTPUT
          fi
          echo "timestamp=$(TZ='Asia/Kolkata' date +'%d-%b-%Y %I:%M %p IST')" >> $GITHUB_OUTPUT

      - name: Parse test results
        id: parse
        if: always()
        run: |
          REPORT_FILE="target/surefire-reports/testng-results.xml"
          if [ -f "$REPORT_FILE" ]; then
            LINE=$(head -3 "$REPORT_FILE" | tr ' ' '\n')
            PASSED=$(echo "$LINE" | sed -n 's/.*passed="\([0-9]*\)".*/\1/p')
            FAILED=$(echo "$LINE" | sed -n 's/.*failed="\([0-9]*\)".*/\1/p')
            SKIPPED=$(echo "$LINE" | sed -n 's/.*skipped="\([0-9]*\)".*/\1/p')
            TOTAL=$((${PASSED:-0} + ${FAILED:-0}))
          else
            TOTAL="N/A"
            PASSED="N/A"
            FAILED="N/A"
            SKIPPED="N/A"
          fi
          echo "total=${TOTAL:-0}" >> $GITHUB_OUTPUT
          echo "passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT

      - name: Extract test details
        id: details
        if: always()
        run: |
          REPORT_FILE="target/surefire-reports/testng-results.xml"
          DURATION=$(TZ='Asia/Kolkata' echo "$(( $(date +%s) - $(date -r target/surefire-reports/testng-results.xml +%s 2>/dev/null || echo 0) )) seconds" 2>/dev/null || echo "N/A")
          
          # Extract registered email from logs
          REG_EMAIL=$(grep -o '[A-Za-z0-9]*@yopmail.com' target/surefire-reports/*.xml 2>/dev/null | head -1 || echo "N/A")
          if [ -z "$REG_EMAIL" ]; then
            REG_EMAIL=$(grep -r 'Email saved to Excel' target/surefire-reports/ 2>/dev/null | grep -o '[A-Za-z0-9]*@yopmail.com' | head -1 || echo "N/A")
          fi
          echo "reg_email=${REG_EMAIL:-N/A}" >> $GITHUB_OUTPUT

      - name: Upload ExtentReport as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}
          path: reports/index.html
          retention-days: 30

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: reports/*.png
          retention-days: 30
          if-no-files-found: ignore

      - name: Send report email to seniors
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "${{ steps.result.outputs.emoji }} MY Bharat Daily Report | ${{ steps.result.outputs.status }} | ${{ steps.result.outputs.timestamp }}"
          to: ${{ secrets.SENIOR_EMAILS }}
          from: "MY Bharat QA <${{ secrets.SMTP_USERNAME }}>"
          html_body: |
            <div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 700px; margin: 0 auto;">
              <!-- Header -->
              <div style="background: linear-gradient(135deg, #160363, #2d0a8f); padding: 25px; text-align: center; border-radius: 8px 8px 0 0;">
                <h1 style="color: #fff; margin: 0; font-size: 22px;">MY Bharat — QA Automation Report</h1>
                <p style="color: #c4b5fd; margin: 8px 0 0; font-size: 13px;">Production Environment | Automated E2E Test Execution</p>
              </div>

              <!-- Status Banner -->
              <div style="background: ${{ steps.result.outputs.color }}; padding: 14px; text-align: center;">
                <h2 style="color: #fff; margin: 0; font-size: 20px;">${{ steps.result.outputs.emoji }} ${{ steps.result.outputs.status }}</h2>
              </div>

              <div style="padding: 25px; border: 1px solid #e0e0e0; border-top: none;">

                <!-- Execution Info -->
                <h3 style="color: #160363; margin: 0 0 12px; border-bottom: 2px solid #160363; padding-bottom: 5px;">Execution Details</h3>
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                  <tr><td style="padding: 8px; font-weight: bold; width: 40%;">Execution Time:</td><td style="padding: 8px;">${{ steps.result.outputs.timestamp }}</td></tr>
                  <tr style="background:#f9f9f9;"><td style="padding: 8px; font-weight: bold;">Environment:</td><td style="padding: 8px;">Production (https://mybharat.gov.in)</td></tr>
                  <tr><td style="padding: 8px; font-weight: bold;">Browser:</td><td style="padding: 8px;">Google Chrome (UI Mode)</td></tr>
                  <tr style="background:#f9f9f9;"><td style="padding: 8px; font-weight: bold;">Test Suite:</td><td style="padding: 8px;">All Modules — Full End-to-End</td></tr>
                  <tr><td style="padding: 8px; font-weight: bold;">Registered User:</td><td style="padding: 8px;">${{ steps.details.outputs.reg_email }}</td></tr>
                </table>

                <!-- Test Results Summary -->
                <h3 style="color: #160363; margin: 0 0 12px; border-bottom: 2px solid #160363; padding-bottom: 5px;">Test Results Summary</h3>
                <table style="width: 100%; border-collapse: collapse; text-align: center; margin-bottom: 20px;">
                  <tr style="background: #160363; color: white;">
                    <th style="padding: 10px;">Total Tests</th><th style="padding: 10px;">Passed</th><th style="padding: 10px;">Failed</th><th style="padding: 10px;">Skipped</th>
                  </tr>
                  <tr style="font-size: 20px; font-weight: bold;">
                    <td style="padding: 12px; border: 1px solid #ddd;">${{ steps.parse.outputs.total }}</td>
                    <td style="padding: 12px; border: 1px solid #ddd; color: #28a745;">${{ steps.parse.outputs.passed }}</td>
                    <td style="padding: 12px; border: 1px solid #ddd; color: #dc3545;">${{ steps.parse.outputs.failed }}</td>
                    <td style="padding: 12px; border: 1px solid #ddd; color: #ffc107;">${{ steps.parse.outputs.skipped }}</td>
                  </tr>
                </table>

                <!-- Detailed Test Breakdown -->
                <h3 style="color: #160363; margin: 0 0 12px; border-bottom: 2px solid #160363; padding-bottom: 5px;">Test Cases Executed</h3>
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px;">
                  <tr style="background: #160363; color: white;">
                    <th style="padding: 8px; text-align: left;">#</th>
                    <th style="padding: 8px; text-align: left;">Module</th>
                    <th style="padding: 8px; text-align: left;">Test Case</th>
                    <th style="padding: 8px; text-align: left;">Description</th>
                  </tr>
                  <tr style="background: #f9f9f9;">
                    <td style="padding: 8px; border: 1px solid #eee;">1</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Registration</td>
                    <td style="padding: 8px; border: 1px solid #eee;">registerIndianYouth</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Register new youth user with OTP verification</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px; border: 1px solid #eee;">2</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Registration</td>
                    <td style="padding: 8px; border: 1px solid #eee;">verifyUserInDatabase</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Verify registered user exists in DB via Redash</td>
                  </tr>
                  <tr style="background: #f9f9f9;">
                    <td style="padding: 8px; border: 1px solid #eee;">3</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Logout</td>
                    <td style="padding: 8px; border: 1px solid #eee;">logoutUser</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Logout after registration</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px; border: 1px solid #eee;">4</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Login</td>
                    <td style="padding: 8px; border: 1px solid #eee;">loginWithOTP</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Login with email from Excel + OTP from Yopmail</td>
                  </tr>
                  <tr style="background: #f9f9f9;">
                    <td style="padding: 8px; border: 1px solid #eee;">5</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Profile</td>
                    <td style="padding: 8px; border: 1px solid #eee;">completeYouthProfile</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Fill all profile sections: Photo, About, Education, Language, Work Exp, Tools</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px; border: 1px solid #eee;">6</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Certificate</td>
                    <td style="padding: 8px; border: 1px solid #eee;">verifyRegistrationCertificateDownload</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Download registration certificate as PNG and verify</td>
                  </tr>
                  <tr style="background: #f9f9f9;">
                    <td style="padding: 8px; border: 1px solid #eee;">7</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Basic Info</td>
                    <td style="padding: 8px; border: 1px solid #eee;">clickBasicInfoAndExtractEmail</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Navigate to Basic Info tab and verify email</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px; border: 1px solid #eee;">8</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Quiz</td>
                    <td style="padding: 8px; border: 1px solid #eee;">attemptCompetitiveQuiz</td>
                    <td style="padding: 8px; border: 1px solid #eee;">Play Competitive Quiz + Submit feedback</td>
                  </tr>
                </table>

                <!-- Test Flow -->
                <h3 style="color: #160363; margin: 0 0 12px; border-bottom: 2px solid #160363; padding-bottom: 5px;">Test Flow</h3>
                <p style="font-size: 13px; color: #555; line-height: 1.8;">
                  Registration (new user) → Logout → Login (OTP) → Complete Profile → Download Certificate → Verify Basic Info → Play Quiz
                </p>

                <!-- View Report Button -->
                <div style="text-align: center; margin: 25px 0;">
                  <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="background: #160363; color: white; padding: 12px 30px; text-decoration: none; border-radius: 6px; font-weight: bold;">View Detailed Report & Logs</a>
                </div>
              </div>

              <!-- Footer -->
              <div style="background: #f8f9fa; padding: 12px; text-align: center; border-radius: 0 0 8px 8px; border: 1px solid #e0e0e0; border-top: none;">
                <p style="color: #888; font-size: 11px; margin: 0;">
                  MY Bharat | QA Automation Team | Nishant Sharma<br>
                  Scheduled Runs: 9:40 AM | 1:00 PM | 5:00 PM | 8:00 PM IST
                </p>
              </div>
            </div>
